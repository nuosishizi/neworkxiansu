name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: microsoft/setup-msbuild@v1

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Create ZIP package
      run: |
        Compress-Archive -Path src, include, WinDivert, CMakeLists.txt, build_gcc.bat, build_msvc.bat, README.md -DestinationPath NetSpeedCtrl-${{ github.ref_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: NetSpeedCtrl-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}