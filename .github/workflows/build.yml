name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: microsoft/setup-msbuild@v1

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Create ZIP package
      run: |
        Compress-Archive -Path src, include, WinDivert, CMakeLists.txt, build_gcc.bat, build_msvc.bat, README.md -DestinationPath NetSpeedCtrl-${{ github.ref_name }}.zip

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./NetSpeedCtrl-${{ github.ref_name }}.zip
        asset_name: NetSpeedCtrl-${{ github.ref_name }}.zip
        asset_content_type: application/zip